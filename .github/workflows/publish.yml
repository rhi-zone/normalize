name: Publish to crates.io

# Triggers after the Release workflow completes successfully.
# This ensures publish only runs after binaries built cleanly across all targets.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  # Manual trigger so a partial publish (e.g. one halted by crates.io rate
  # limits) can be resumed without re-running the full Release workflow.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # Run when: workflow_run from a successful v* Release, OR manual dispatch.
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - uses: actions/checkout@v4
        with:
          # On workflow_run: check out the exact commit Release built. On
          # manual dispatch: use the default ref (the branch the workflow
          # was dispatched from, typically the latest tag's commit).
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Compute publish order
        id: order
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys, os

          meta = json.loads(subprocess.check_output(
              ["cargo", "metadata", "--format-version", "1"],
              stderr=subprocess.DEVNULL,
          ))

          workspace_ids = set(meta["workspace_members"])
          pkgs = {p["id"]: p for p in meta["packages"] if p["id"] in workspace_ids}

          # Filter to publishable crates.
          # publish field: null → publish anywhere; [] → do not publish; ["crates-io"] → publish there.
          publishable = {
              pid: pkg for pid, pkg in pkgs.items()
              if pkg.get("publish") is None or (isinstance(pkg.get("publish"), list) and len(pkg["publish"]) > 0)
          }

          pub_names = {pkg["name"] for pkg in publishable.values()}

          # Build intra-workspace dependency graph.
          deps_of = {pkg["name"]: set() for pkg in publishable.values()}
          dependents_of = {name: [] for name in pub_names}
          for pkg in publishable.values():
              for dep in pkg.get("dependencies", []):
                  dep_name = dep["name"]
                  if dep_name in pub_names:
                      deps_of[pkg["name"]].add(dep_name)
                      dependents_of[dep_name].append(pkg["name"])

          # Kahn's algorithm (stable sort for determinism).
          in_degree = {name: len(deps) for name, deps in deps_of.items()}
          queue = sorted(n for n, d in in_degree.items() if d == 0)
          order = []
          while queue:
              node = queue.pop(0)
              order.append(node)
              for dependent in sorted(dependents_of[node]):
                  in_degree[dependent] -= 1
                  if in_degree[dependent] == 0:
                      queue.append(dependent)
                      queue.sort()

          if len(order) != len(pub_names):
              print("ERROR: cycle detected in dependency graph", file=sys.stderr)
              sys.exit(1)

          output = "crates=" + " ".join(order)
          print(output)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(output + "\n")
          PYEOF

      - name: Check CARGO_REGISTRY_TOKEN is set
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "ERROR: CARGO_REGISTRY_TOKEN secret is not set." >&2
            echo "" >&2
            echo "To fix:" >&2
            echo "  1. Generate a token at https://crates.io/settings/tokens" >&2
            echo "  2. Add it at: Settings → Secrets and variables → Actions → New repository secret" >&2
            echo "  3. Name the secret CARGO_REGISTRY_TOKEN" >&2
            echo "  4. Re-run this workflow" >&2
            exit 1
          fi

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -u

          publish_one() {
            local crate=$1
            local attempt=0
            while [ $attempt -lt 5 ]; do
              attempt=$((attempt + 1))
              local output
              if output=$(cargo publish -p "$crate" --no-verify 2>&1); then
                echo "$output"
                echo "  ✓ published"
                return 0
              elif echo "$output" | grep -qE "already (uploaded|exists on crates.io)"; then
                echo "  ✓ already published (skipping)"
                return 0
              elif echo "$output" | grep -qE "429 Too Many Requests"; then
                # crates.io rate limit. Two flavours:
                #   - "Please try again after <RFC date>" (new-crate burst)
                #   - generic "too many ... please try again later"
                # Parse the date if present and sleep until then; else fall
                # back to exponential backoff (60s, 120s, 240s, 480s, 960s).
                local retry_after
                # crates.io 429 body looks like:
                #   "...Please try again after Fri, 08 May 2026 10:29:33 GMT and see https://crates.io/..."
                # Extract just the RFC 1123 timestamp (`<Day>, <D> <Mon> <Year> HH:MM:SS GMT`).
                retry_after=$(echo "$output" \
                  | grep -oE "Please try again after [A-Z][a-z]+, [0-9]+ [A-Z][a-z]+ [0-9]+ [0-9:]+ GMT" \
                  | sed -E 's/^Please try again after //')
                local sleep_secs
                if [ -n "$retry_after" ]; then
                  local target_epoch now_epoch
                  target_epoch=$(date -u -d "$retry_after" +%s 2>/dev/null || echo 0)
                  now_epoch=$(date -u +%s)
                  if [ "$target_epoch" -gt "$now_epoch" ]; then
                    sleep_secs=$((target_epoch - now_epoch + 30))
                  else
                    sleep_secs=$((60 * (1 << (attempt - 1))))
                  fi
                  echo "  ⏳ rate-limited, retry-after $retry_after (sleeping ${sleep_secs}s)" >&2
                else
                  sleep_secs=$((60 * (1 << (attempt - 1))))
                  echo "  ⏳ rate-limited (no retry-after header), backing off ${sleep_secs}s" >&2
                fi
                sleep "$sleep_secs"
                continue
              else
                echo "$output" >&2
                echo "  ✗ publish failed for $crate" >&2
                return 1
              fi
            done
            echo "  ✗ giving up on $crate after $attempt attempts" >&2
            return 1
          }

          for crate in ${{ steps.order.outputs.crates }}; do
            echo "Publishing $crate..."
            if ! publish_one "$crate"; then
              exit 1
            fi
            sleep 20
          done
