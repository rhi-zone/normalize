name: Publish to crates.io

# Triggers after the Release workflow completes successfully.
# This ensures publish only runs after binaries built cleanly across all targets.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  publish:
    runs-on: ubuntu-latest
    # Gate on: (1) Release workflow succeeded, (2) original trigger was a v* tag push.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Compute publish order
        id: order
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys, os

          meta = json.loads(subprocess.check_output(
              ["cargo", "metadata", "--format-version", "1"],
              stderr=subprocess.DEVNULL,
          ))

          workspace_ids = set(meta["workspace_members"])
          pkgs = {p["id"]: p for p in meta["packages"] if p["id"] in workspace_ids}

          # Filter to publishable crates.
          # publish field: null → publish anywhere; [] → do not publish; ["crates-io"] → publish there.
          publishable = {
              pid: pkg for pid, pkg in pkgs.items()
              if pkg.get("publish") is None or (isinstance(pkg.get("publish"), list) and len(pkg["publish"]) > 0)
          }

          pub_names = {pkg["name"] for pkg in publishable.values()}

          # Build intra-workspace dependency graph.
          deps_of = {pkg["name"]: set() for pkg in publishable.values()}
          dependents_of = {name: [] for name in pub_names}
          for pkg in publishable.values():
              for dep in pkg.get("dependencies", []):
                  dep_name = dep["name"]
                  if dep_name in pub_names:
                      deps_of[pkg["name"]].add(dep_name)
                      dependents_of[dep_name].append(pkg["name"])

          # Kahn's algorithm (stable sort for determinism).
          in_degree = {name: len(deps) for name, deps in deps_of.items()}
          queue = sorted(n for n, d in in_degree.items() if d == 0)
          order = []
          while queue:
              node = queue.pop(0)
              order.append(node)
              for dependent in sorted(dependents_of[node]):
                  in_degree[dependent] -= 1
                  if in_degree[dependent] == 0:
                      queue.append(dependent)
                      queue.sort()

          if len(order) != len(pub_names):
              print("ERROR: cycle detected in dependency graph", file=sys.stderr)
              sys.exit(1)

          output = "crates=" + " ".join(order)
          print(output)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(output + "\n")
          PYEOF

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "ERROR: CARGO_REGISTRY_TOKEN secret is not set." >&2
            echo "Set it at: Settings → Secrets and variables → Actions → New repository secret" >&2
            exit 1
          fi
          for crate in ${{ steps.order.outputs.crates }}; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --no-verify
            sleep 20
          done
