name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install sessions SPA deps
        run: bun install
        working-directory: web/sessions

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p normalize --features sessions-web
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build grammars
        if: matrix.target != 'aarch64-unknown-linux-gnu'  # Skip cross-compiled targets
        run: cargo xtask build-grammars

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/normalize dist/
          cd dist
          tar -czf normalize-${{ matrix.target }}.tar.gz normalize
          rm normalize

      - name: Prepare grammars artifact (Unix)
        if: runner.os != 'Windows' && matrix.target != 'aarch64-unknown-linux-gnu'
        run: |
          cd target/grammars
          tar -czf ../../dist/normalize-grammars-${{ matrix.target }}.tar.gz *.so 2>/dev/null || \
          tar -czf ../../dist/normalize-grammars-${{ matrix.target }}.tar.gz *.dylib 2>/dev/null || \
          true

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/normalize.exe" -Destination "dist/"
          Compress-Archive -Path "dist/normalize.exe" -DestinationPath "dist/normalize-${{ matrix.target }}.zip"
          Remove-Item "dist/normalize.exe"

      - name: Prepare grammars artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "target/grammars/*.dll") {
            Compress-Archive -Path "target/grammars/*.dll" -DestinationPath "dist/normalize-grammars-${{ matrix.target }}.zip"
          }

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: normalize-${{ matrix.target }}
          path: dist/normalize-${{ matrix.target }}.*

      - name: Upload grammars artifact
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: normalize-grammars-${{ matrix.target }}
          path: dist/normalize-grammars-${{ matrix.target }}.*
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"
          # Extract the block between this version's header and the next
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          # Pass multiline output through environment file
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Normalize CLI ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            release/*
          body: |
            ${{ steps.changelog.outputs.notes }}

            ---

            ### Installation

            ```bash
            curl -fsSL https://rhi.zone/normalize/install.sh | sh
            ```

            ```powershell
            irm https://rhi.zone/normalize/install.ps1 | iex
            ```

            **Manual download:** pick the archive for your platform from the assets below and verify with `SHA256SUMS.txt`.
