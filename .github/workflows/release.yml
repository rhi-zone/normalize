name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install sessions SPA deps
        run: bun install
        working-directory: web/sessions

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p normalize --features sessions-web
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          # musl: produce a dynamically-linked binary so `dlopen()` works for
          # tree-sitter grammar `.so` files. The default for *-linux-musl is
          # `+crt-static`, which produces a static-pie binary that cannot
          # dlopen at runtime — that limited musl users to the 6 grammars
          # statically linked via `arborium-*` crates. We disable crt-static
          # and add `$ORIGIN` rpath so the binary can find bundled grammar
          # libraries (and the bundled libc) next to itself.
          # The release tarball ships a wrapper script + bundled
          # `ld-musl-x86_64.so.1` / `libc.musl-x86_64.so.1`, so the artifact
          # is fully self-contained — no system musl required.
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS: "-C target-feature=-crt-static -C link-arg=-Wl,-rpath,$ORIGIN"

      - name: Build grammars
        if: matrix.target != 'aarch64-unknown-linux-gnu'  # Skip cross-compiled targets
        run: cargo xtask build-grammars

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows' && matrix.target != 'x86_64-unknown-linux-musl'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/normalize dist/
          cd dist
          tar -czf normalize-${{ matrix.target }}.tar.gz normalize
          rm normalize

      - name: Prepare artifact (musl, self-contained)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          set -euo pipefail
          # Layout inside the tarball:
          #   normalize                       <- POSIX-sh wrapper script
          #   runtime/normalize.elf           <- the actual ELF binary
          #   runtime/ld-musl-x86_64.so.1     <- bundled musl loader
          #   runtime/libc.musl-x86_64.so.1   <- bundled musl libc (same file
          #                                      as the loader on musl)
          # The wrapper resolves its own real path (via readlink -f), then
          # invokes `runtime/ld-musl-x86_64.so.1 --library-path runtime
          # runtime/normalize.elf "$@"`. This makes the artifact fully
          # self-contained — no system musl libc / loader required.
          mkdir -p dist/runtime

          # Locate musl libc on the runner. Ubuntu's `musl-tools` package
          # installs it at one of these paths.
          MUSL_LIBC=""
          for candidate in \
            /usr/lib/x86_64-linux-musl/libc.so \
            /lib/x86_64-linux-musl/libc.so \
            /lib/ld-musl-x86_64.so.1; do
            if [ -e "$candidate" ]; then
              MUSL_LIBC="$candidate"
              break
            fi
          done
          if [ -z "$MUSL_LIBC" ]; then
            echo "Could not locate musl libc on the runner" >&2
            exit 1
          fi
          echo "Using musl libc: $MUSL_LIBC"

          cp target/${{ matrix.target }}/release/normalize dist/runtime/normalize.elf
          # On musl, the dynamic loader and libc are literally the same .so
          # file. Ship it under both names so dlopen("libc.musl-...") and
          # the explicit loader invocation both work.
          cp "$MUSL_LIBC" dist/runtime/ld-musl-x86_64.so.1
          cp "$MUSL_LIBC" dist/runtime/libc.musl-x86_64.so.1
          chmod +x dist/runtime/ld-musl-x86_64.so.1

          # Also patch the ELF's PT_INTERP to a relative path so anyone
          # who invokes `runtime/normalize.elf` directly (without the
          # wrapper) and happens to be `cd`'d into `runtime/` still works.
          # The wrapper does NOT rely on this — it calls the loader
          # explicitly — but a relative interpreter is harmless and gives
          # one extra fallback.
          patchelf --set-interpreter './ld-musl-x86_64.so.1' dist/runtime/normalize.elf || true
          patchelf --set-rpath '$ORIGIN' dist/runtime/normalize.elf

          cat > dist/normalize <<'WRAPPER'
          #!/bin/sh
          # normalize wrapper — invokes the bundled musl loader explicitly so
          # the artifact runs on any Linux x86_64 system without requiring
          # musl libc to be installed.
          set -e
          # Resolve the wrapper's real location (follows symlinks).
          SELF="$0"
          if [ -L "$SELF" ]; then
              # readlink -f is GNU/busybox; fall back to a manual loop on
              # systems where it's missing.
              if command -v readlink >/dev/null 2>&1; then
                  RESOLVED=$(readlink -f "$SELF" 2>/dev/null || true)
                  if [ -n "$RESOLVED" ]; then SELF="$RESOLVED"; fi
              fi
          fi
          DIR=$(cd "$(dirname "$SELF")" && pwd)
          RUNTIME="$DIR/runtime"
          if [ ! -x "$RUNTIME/ld-musl-x86_64.so.1" ] || [ ! -f "$RUNTIME/normalize.elf" ]; then
              echo "normalize: bundled runtime not found at $RUNTIME" >&2
              echo "  expected files: ld-musl-x86_64.so.1, normalize.elf" >&2
              echo "  did the install step preserve the runtime/ directory?" >&2
              exit 127
          fi
          exec "$RUNTIME/ld-musl-x86_64.so.1" \
              --library-path "$RUNTIME" \
              "$RUNTIME/normalize.elf" "$@"
          WRAPPER
          chmod +x dist/normalize

          cd dist
          tar -czf normalize-${{ matrix.target }}.tar.gz normalize runtime
          rm -rf normalize runtime

      - name: Prepare grammars artifact (Unix)
        if: runner.os != 'Windows' && matrix.target != 'aarch64-unknown-linux-gnu'
        run: |
          cd target/grammars
          tar -czf ../../dist/normalize-grammars-${{ matrix.target }}.tar.gz *.so 2>/dev/null || \
          tar -czf ../../dist/normalize-grammars-${{ matrix.target }}.tar.gz *.dylib 2>/dev/null || \
          true

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/normalize.exe" -Destination "dist/"
          Compress-Archive -Path "dist/normalize.exe" -DestinationPath "dist/normalize-${{ matrix.target }}.zip"
          Remove-Item "dist/normalize.exe"

      - name: Prepare grammars artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "target/grammars/*.dll") {
            Compress-Archive -Path "target/grammars/*.dll" -DestinationPath "dist/normalize-grammars-${{ matrix.target }}.zip"
          }

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: normalize-${{ matrix.target }}
          path: dist/normalize-${{ matrix.target }}.*

      - name: Upload grammars artifact
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: normalize-grammars-${{ matrix.target }}
          path: dist/normalize-grammars-${{ matrix.target }}.*
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"
          # Extract the block between this version's header and the next
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          # Pass multiline output through environment file
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Normalize CLI ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            release/*
          body: |
            ${{ steps.changelog.outputs.notes }}

            ---

            ### Installation

            ```bash
            curl -fsSL https://rhi.zone/normalize/install.sh | sh
            ```

            ```powershell
            irm https://rhi.zone/normalize/install.ps1 | iex
            ```

            **Manual download:** pick the archive for your platform from the assets below and verify with `SHA256SUMS.txt`.
