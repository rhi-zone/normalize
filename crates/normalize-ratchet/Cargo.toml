[package]
name = "normalize-ratchet"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Metric regression-tracking (ratchet) for normalize — baselines, checks, and update commands"

[features]
default = []
# Enable CLI service registration via server-less proc macro
cli = ["dep:server-less", "dep:normalize-output"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = "1"
server-less = { workspace = true, optional = true }
normalize-output = { path = "../normalize-output", version = "0.1.0", optional = true }
schemars = "1"
