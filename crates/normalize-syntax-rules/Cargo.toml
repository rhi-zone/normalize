[package]
name = "normalize-syntax-rules"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Syntax-based linting rules with tree-sitter queries"

[[bin]]
name = "normalize-syntax-rules"
path = "src/main.rs"
required-features = ["cli"]

[features]
default = ["fix"]
cli = ["dep:server-less", "dep:tokio", "fix"]
fix = []

[dependencies]
server-less = { workspace = true, optional = true }
serde_json.workspace = true
tokio = { workspace = true, optional = true }
# Core
serde.workspace = true
rusqlite.workspace = true
gix = { workspace = true }
dirs.workspace = true
ignore.workspace = true

# Rule parsing
glob = "0.3"
toml = "0.8"
regex = "1"

# Tree-sitter execution
tree-sitter = "0.26"
streaming-iterator = "0.1"

# ast-grep query execution
ast-grep-core = "0.40.5"

# Language support
normalize-languages = { path = "../normalize-languages", version = "0.2.0" }

# Schema generation
schemars = "1"

# Core traits
normalize-core = { path = "../normalize-core", version = "0.2.0" }
normalize-rules-config = { path = "../normalize-rules-config", version = "0.2.0" }
normalize-output = { path = "../normalize-output", version = "0.2.0" }

[dev-dependencies]
tempfile = "3"
