# Language metadata for normalize.
#
# Each [[language]] entry defines capabilities and test file glob patterns
# for a language or group of related languages.
#
# Fields:
#   names       - canonical name(s) and aliases; names[0] is the canonical
#                 name used for capabilities lookup (case-sensitive, must
#                 match Language::name()). All names/extensions are
#                 case-insensitive for test_globs lookup.
#   extensions  - file extensions (dot optional, case-insensitive)
#   test_globs  - glob patterns matching dedicated test files; omit if the
#                 language has no test file convention (e.g. C, C++, Zig)
#
# Capabilities:
#   capabilities.preset = "all" | "data_format" | "markup" | "query" |
#                         "build_dsl" | "shell" | "none"
#   capabilities.imports, .callable_symbols, .complexity, .executable
#     (bool overrides applied on top of the preset)
#   Omitting capabilities entirely means Capabilities::all() (full
#   programming language).

# ============================================================
# Full programming languages (Capabilities::all() = default)
# ============================================================

[[language]]
names = ["Go", "golang"]
extensions = ["go"]
test_globs = ["**/*_test.go"]

[[language]]
names = ["Rust", "rust"]
extensions = ["rs"]
test_globs = ["**/tests/**/*.rs"]

[[language]]
names = ["Python", "python", "py"]
extensions = ["py", "pyw"]
test_globs = ["**/test_*.py", "**/*_test.py"]

[[language]]
names = ["JavaScript", "js"]
extensions = ["js", "jsx"]
test_globs = [
  "**/__tests__/**/*.js",
  "**/__mocks__/**/*.js",
  "**/*.test.js",
  "**/*.spec.js",
  "**/*.test.jsx",
  "**/*.spec.jsx",
]

[[language]]
names = ["TypeScript", "TSX", "ts", "tsx"]
extensions = ["ts", "tsx"]
test_globs = [
  "**/__tests__/**/*.ts",
  "**/__mocks__/**/*.ts",
  "**/*.test.ts",
  "**/*.spec.ts",
  "**/*.test.tsx",
  "**/*.spec.tsx",
]

[[language]]
names = ["Ruby", "ruby"]
