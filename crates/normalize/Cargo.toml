[package]
name = "normalize"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Fast code intelligence CLI and library"

[lib]
name = "normalize"
path = "src/lib.rs"

[[bin]]
name = "normalize"
path = "src/main.rs"
required-features = ["cli"]

[features]
default = ["cli-full"]

# Core normalize CLI (server-less proc macro; clap re-exported from server-less)
cli = []

# Drop-in CLI replacements (each implies cli)
jq-cli = ["cli"]
rg-cli = ["cli"]
ast-grep-cli = ["cli", "dep:clap"]

# Full battery: normalize CLI + all drop-in replacements
cli-full = ["cli", "jq-cli", "rg-cli", "ast-grep-cli"]

# Optional MCP server support
mcp = ["rmcp"]

# Build sessions web UI (requires bun/npm, enable in CI)
sessions-web = []

[dependencies]
clap = { workspace = true, optional = true }
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
walkdir.workspace = true
ignore.workspace = true
nucleo-matcher.workspace = true
libsql.workspace = true
tree-sitter = "0.26"
streaming-iterator = "0.1"
dirs = "5"
normalize-core = { path = "../normalize-core", version = "0.2.0" }
normalize-output = { path = "../normalize-output", version = "0.2.0" }
normalize-facts = { path = "../normalize-facts", version = "0.2.0" }
normalize-facts-core = { path = "../normalize-facts-core", version = "0.2.0" }
normalize-semantic = { path = "../normalize-semantic", version = "0.2.0", features = ["cli"] }
normalize-facts-rules-api = { path = "../normalize-facts-rules-api", version = "0.2.0" }
normalize-facts-rules-interpret = { path = "../normalize-facts-rules-interpret", version = "0.2.0" }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
normalize-languages = { path = "../normalize-languages", version = "0.2.0" }
normalize-local-deps = { path = "../normalize-local-deps", version = "0.2.0" }
normalize-typegen = { path = "../normalize-typegen", version = "0.2.0", features = ["input-typescript"] }
normalize-syntax-rules = { path = "../normalize-syntax-rules", version = "0.2.0" }
normalize-openapi = { path = "../normalize-openapi", version = "0.2.0" }
normalize-ecosystems = { path = "../normalize-ecosystems", version = "0.2.0" }
normalize-chat-sessions = { path = "../normalize-chat-sessions", version = "0.2.0", features = ["schema"] }
normalize-session-analysis = { path = "../normalize-session-analysis", version = "0.2.0" }
normalize-path-resolve = { path = "../normalize-path-resolve", version = "0.2.0" }
normalize-shadow = { path = "../normalize-shadow", version = "0.2.0" }
normalize-edit = { path = "../normalize-edit", version = "0.2.0" }
normalize-refactor = { path = "../normalize-refactor", version = "0.2.0" }
normalize-deps = { path = "../normalize-deps", version = "0.2.0" }
normalize-filter = { path = "../normalize-filter", version = "0.2.0", features = ["config"] }
normalize-scope = { path = "../normalize-scope", version = "0.2.0" }
normalize-graph = { path = "../normalize-graph", version = "0.2.0" }
normalize-code-similarity = { path = "../normalize-code-similarity", version = "0.2.0" }
normalize-tools = { path = "../normalize-tools", version = "0.2.0" }
normalize-analyze = { path = "../normalize-analyze", version = "0.2.0" }
normalize-architecture = { path = "../normalize-architecture", version = "0.2.0" }
normalize-native-rules = { path = "../normalize-native-rules", version = "0.2.0" }
normalize-budget = { path = "../normalize-budget", version = "0.2.0", features = ["cli"] }
normalize-ratchet = { path = "../normalize-ratchet", version = "0.2.0", features = ["cli"] }
normalize-rules = { path = "../normalize-rules", version = "0.2.0", features = ["cli"] }
normalize-rules-config = { path = "../normalize-rules-config", version = "0.2.0" }
normalize-context = { path = "../normalize-context", version = "0.2.0", features = ["cli"] }
server-less = { workspace = true }
normalize-cli-parser = { path = "../normalize-cli-parser", version = "0.2.0" }
normalize-surface-syntax = { path = "../normalize-surface-syntax", version = "0.2.0", features = ["read-typescript", "read-lua", "read-python", "write-typescript", "write-lua", "write-python"] }
grep-matcher.workspace = true
grep-regex.workspace = true
grep-searcher.workspace = true
grep = "0.4"
lexopt = "0.3"
anyhow = "1"
thiserror = "2"
bstr = "1"
termcolor = "1"
textwrap = { version = "0.16", default-features = false }
log = "0.4"
rayon.workspace = true
tokio.workspace = true
axum.workspace = true
utoipa = { version = "5", features = ["axum_extras"] }
notify.workspace = true
ureq = { version = "2", features = ["json"] }
flate2 = "1"
tar = "0.4"
zip = "2"
regex = "1"
jaq-core.workspace = true
jaq-std.workspace = true
jaq-json.workspace = true
tempfile = "3"
toml = "0.8"
toml_edit = "0.22"
jsonschema = { workspace = true }
rmcp = { version = "0.12", features = ["server", "macros", "schemars", "transport-io"], optional = true }
schemars = "1"
tower-lsp = "0.20"
git2 = { version = "0.19", default-features = false }
gix = { workspace = true }
glob = "0.3.3"
nu-ansi-term = "0.50"
dotenvy = "0.15.7"
chrono = { version = "0.4", default-features = false, features = ["std", "clock"] }
ast-grep-core = "0.40.5"
ast-grep-config = "0.40.5"
crossterm = "0.28"
codespan-reporting = "0.11"
similar = { version = "2", features = ["inline"] }
smallvec = "1"
indicatif.workspace = true

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
insta = "1"
assert_cmd = "2"

[build-dependencies]
flate2 = "1"
