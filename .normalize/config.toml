# Normalize configuration
# See: https://github.com/rhi-zone/normalize

[walk]
# Project-wide path exclusions (gitignore-style; affects walker AND index).
# .claude/worktrees/ holds ephemeral agent worktrees — full repo copies that
# shouldn't be linted as part of this project. The rest of .claude/ (settings,
# command/agent definitions, hooks) is project config and IS lintable.
exclude = [".git/", ".claude/worktrees/"]

[daemon]
# enabled = true
# auto_start = true

[analyze]
# Exclude normalize-languages/src from clone detection: ~98 language files all implement
# the same Language trait with nearly-identical Symbol constructors across extract_function,
# extract_container, extract_type. These are intentionally parallel, not copy-paste.
# Affects all analyze subcommands. Per-subcommand overrides: [analyze.<subcommand>] exclude = [...]
exclude = [
    # ~98 language files implement the same Language trait with nearly-identical
    # Symbol constructors. Intentionally parallel, not copy-paste.
    "crates/normalize-languages/src/**",
    # Package index has intentionally parallel parsers for each distro/repo —
    # each parser targets a different format but uses similar parsing scaffolding.
    "crates/normalize-package-index/src/**",
    # Surface-syntax input/output implement the same IR for each language —
    # intentionally parallel (typescript.rs, lua.rs, python.rs all read/write same nodes).
    "crates/normalize-surface-syntax/src/**",
    # Test files use similar setup/assertion patterns by design.
    "crates/normalize-typegen/tests/**",
    "**/tests/**",
    # Specs and CI files are not production code.
    "specs/**",
    "action.yml",
    # Markdown docs have similar structure but are not code.
    "docs/**",
    "**/*.md",
    # Cargo.toml and config files have similar structure by convention.
    "**/*.toml",
    "**/*.yml",
    "**/*.yaml",
    "**/*.json",
]
# hotspots_exclude = ["*.md", "*.json"]  # example: exclude markdown and JSON

# Per-rule configuration: { "rule-id" = { severity = "...", enabled = true/false } }
# Global allow: skip violations in test fixture files for all rules.
[rules]
global-allow = ["**/tests/fixtures/**", "**/fixtures/**"]

# Disable println-debug for CLI tools (we use println for output)
[rules.rule."rust/println-debug"]
enabled = false

# dbg!/todo!/expect("") should never reach committed code.
[rules.rule."rust/dbg-macro"]
severity = "error"
allow = ["**/tests/fixtures/**"]

[rules.rule."rust/todo-macro"]
severity = "error"
allow = ["**/tests/fixtures/**"]

[rules.rule."rust/expect-empty"]
severity = "error"
allow = ["**/tests/fixtures/**"]

# static mut is an unsafe footgun; always wrong outside of FFI/embedded.
[rules.rule."rust/static-mut"]
severity = "error"
enabled = true
allow = ["**/tests/fixtures/**"]

# js/console-log: re-enabled below with allow patterns

# Enable numeric literal suffix rule (disabled by default).
# Exclude rule fixtures: those files intentionally contain the bad pattern to test detection.
[rules.rule."rust/numeric-type-annotation"]
enabled = true
allow = ["**/tests/fixtures/**"]

# Audit complete: all 1608 violations resolved (inline suppressed with reasons or allow-listed).
# Production .unwrap() uses are annotated; test code in inline #[cfg(test)] modules allowed below.
[rules.rule."rust/unwrap-in-impl"]
severity = "warning"
enabled = true
allow = [
    # Inline #[cfg(test)] modules in src/ files (not covered by **/tests/**)
    "crates/normalize-path-resolve/src/lib.rs",
    "crates/normalize-ecosystems/src/ecosystems/npm/lockfile_bun.rs",
    "crates/normalize-ecosystems/src/ecosystems/npm/lockfile_npm.rs",
    "crates/normalize-ecosystems/src/ecosystems/npm/lockfile_pnpm.rs",
    "crates/normalize-ecosystems/src/ecosystems/npm/lockfile_yarn.rs",
    "crates/normalize-ecosystems/src/ecosystems/npm/mod.rs",
    "crates/normalize-ecosystems/src/ecosystems/python.rs",
    "crates/normalize-facts/src/extract.rs",
    "crates/normalize-facts/src/index.rs",
    # normalize-manifest: audited — production violations fixed (nuget.rs if-let refactor,
    # ocaml.rs peek-then-next inline suppressed, setup_py.rs bytes-index refactor).
    # Remaining violations are all in inline #[cfg(test)] mod blocks.
    "crates/normalize-manifest/src/*.rs",
    # normalize-facts-rules-interpret: audited — production lib.rs is clean;
    # tests.rs extracted from inline mod to separate file, .unwrap() is idiomatic in tests.
    "crates/normalize-facts-rules-interpret/src/tests.rs",
    # normalize-typegen: audited — production violations inline-suppressed with reasons.
    # Remaining violations are all in inline #[cfg(test)] mod blocks.
    "crates/normalize-typegen/src/input/jsonschema.rs",
    "crates/normalize-typegen/src/input/openapi.rs",
    "crates/normalize-typegen/src/input/typescript.rs",
    # normalize-cli-parser: audited — production violations inline-suppressed with reasons.
    # Remaining violations are all in inline #[cfg(test)] mod blocks.
    "crates/normalize-cli-parser/src/lib.rs",
    "crates/normalize-cli-parser/src/formats/argparse.rs",
    "crates/normalize-cli-parser/src/formats/clap.rs",
    "crates/normalize-cli-parser/src/formats/click.rs",
    "crates/normalize-cli-parser/src/formats/cobra.rs",
    "crates/normalize-cli-parser/src/formats/commander.rs",
    "crates/normalize-cli-parser/src/formats/yargs.rs",
    # normalize-languages: audited — production violations inline-suppressed with reasons.
    # Remaining violations are all in inline #[cfg(test)] mod blocks.
    "crates/normalize-languages/src/external_packages.rs",
    "crates/normalize-languages/src/grammar_loader.rs",
    "crates/normalize-languages/src/python.rs",
    # normalize-edit: audited — all violations are in inline #[cfg(test)] mod block.
    "crates/normalize-edit/src/lib.rs",
    # normalize-view: audited — production violations inline-suppressed with reasons.
    # Remaining violations are all in inline #[cfg(test)] mod blocks.
    "crates/normalize-view/src/skeleton.rs",
    "crates/normalize-view/src/tree.rs",
    # normalize (main crate) rg/: vendored from ripgrep — defs.rs has 500+ test assertions
    # using .unwrap() idiomatically; version.rs has writeln!() to String (infallible).
    "crates/normalize/src/rg/**",
    # normalize (main crate) ast_grep/: vendored from ast-grep 0.41.0 (MIT) — production violations
    # are infallible (String::from_utf8 on ast-grep internal buffers, TypesBuilder constants,
    # mutex lock, test assertions). Not our code to refactor.
    "crates/normalize/src/ast_grep/**",
    # normalize (main crate): audited — production violations inline-suppressed with reasons.
    # Remaining violations are all in inline #[cfg(test)] mod blocks.
    "crates/normalize/src/analyze/complexity.rs",
    "crates/normalize/src/config.rs",
    "crates/normalize/src/paths.rs",
    "crates/normalize/src/skeleton.rs",
    "crates/normalize/src/commands/view/search.rs",
    "crates/normalize/src/commands/init.rs",
    "crates/normalize/src/tree.rs",
    # text_search.rs: format_text/format_pretty use writeln!(String,...).unwrap() which is infallible;
    # #[cfg(test)] block uses .unwrap() idiomatically.
    "crates/normalize/src/text_search.rs",
    # tools/lint.rs: format_text uses writeln!(String,...).unwrap() which is infallible.
    "crates/normalize/src/commands/tools/lint.rs",
    # context.rs: all violations in #[cfg(test)] block — tempdir/fs::write idiom.
    "crates/normalize/src/commands/context.rs",
    # normalize-package-index: tests.rs is a dedicated test module; apk.rs test block.
    "crates/normalize-package-index/src/index/tests.rs",
    # xtask: build-tool binary, not a library — .unwrap() in build scripts is conventional.
    "xtask/src/main.rs",
    # update.rs: SHA-256 implementation — try_into().unwrap() calls are infallible:
    # buffer[..64] is guarded by while len>=64, chunks(64) on 64-byte-padded buffer,
    # and block[i*4..(i+1)*4] for i<16 always yields exactly 4 bytes.
    "crates/normalize/src/commands/update.rs",
]

[rules.rule."rust/unnecessary-let"]
severity = "warning"
enabled = true
# normalize-manifest parsers use let x = i; while i < ... (index-snapshot pattern:
# captures start position before mutation). Needs dataflow analysis to exclude.
allow = [
    "crates/normalize-manifest/src/clojure.rs",
    "crates/normalize-manifest/src/erlang.rs",
    "crates/normalize-manifest/src/sexpr.rs",
    "**/tests/fixtures/**",
]

[rules.rule."rust/unnecessary-type-alias"]
severity = "warning"
enabled = true
allow = ["**/tests/fixtures/**"]

[rules.rule."rust/chained-if-let"]
enabled = true

[rules.rule."js/console-log"]
enabled = true
# editors/vscode/: console.log is intentional lifecycle logging for VSCode extension host
allow = ["**/fixtures/**", "editors/vscode/**"]

[rules.rule."js/unnecessary-const"]
enabled = true

[rules.rule."python/print-debug"]
enabled = true
# cli-parser fixtures are example scripts showing what the parser handles, not production code
allow = ["**/fixtures/**"]

[rules.rule."python/tuple-return"]
enabled = true

[rules.rule."go/fmt-print"]
enabled = true
# cli-parser fixtures are example scripts showing what the parser handles, not production code
allow = ["**/fixtures/**"]

[rules.rule."go/many-returns"]
enabled = true

[rules.rule."typescript/tuple-return"]
enabled = true

[rules.rule."no-todo-comment"]
enabled = true
# config.rs doc comment shows example config with "TODO.md" as a filename (not a work item).
# ast_grep/ is vendored from upstream ast-grep — inherited TODO comments are not our work items.
allow = [
    "crates/normalize/src/config.rs",
    "crates/normalize/src/ast_grep/**",
]

# no-grammar-loader-new: allow in test modules and test files (tests may need custom loaders
# with add_path() for isolated grammar directories, which requires GrammarLoader::new()).
# normalize-scope/src/lib.rs test module uses add_path() which requires a mutable loader.
[rules.rule."no-grammar-loader-new"]
allow = ["**/tests/**", "crates/*/tests/**", "crates/normalize-scope/src/lib.rs"]

# rust/tuple-return: rg/ is vendored from ripgrep (do not modify); fixtures intentionally
# contain the bad pattern. All other violations must be fixed.
[rules.rule."rust/tuple-return"]
severity = "error"
enabled = true
allow = ["crates/normalize/src/rg/**", "**/tests/fixtures/**"]

# SUMMARY.md freshness: currently at info severity (TODO: re-escalate to "error" once all
# SUMMARY.md enforcement — severity=error blocks commits when SUMMARY.md is stale/missing.
[rules.rule."stale-summary"]
severity = "error"

[rules.rule."missing-summary"]
severity = "error"

# Error-severity: genuine bugs / serious antipatterns — clean in current codebase.
[rules.rule."python/mutable-default-arg"]
severity = "error"
enabled = true
allow = ["**/tests/fixtures/**"]

[rules.rule."python/bare-except"]
severity = "error"
enabled = true
allow = ["**/tests/fixtures/**"]

[rules.rule."ruby/rescue-exception"]
severity = "error"
enabled = true
allow = ["**/tests/fixtures/**"]

[rules.rule."go/error-ignored"]
severity = "error"
enabled = true
allow = ["**/tests/fixtures/**"]

# Warning-severity: bad practice but sometimes intentional.
[rules.rule."js/var-declaration"]
severity = "warning"
enabled = true
allow = ["**/tests/fixtures/**"]

[rules.rule."js/typeof-string"]
severity = "warning"
enabled = true
allow = ["**/tests/fixtures/**"]

[rules.rule."ruby/puts-in-lib"]
severity = "warning"
enabled = true
allow = ["**/tests/fixtures/**"]

# Info-severity (already enabled).
[rules.rule."js/eq-null"]
enabled = true

[rules.rule."python/assert-in-non-test"]
enabled = true

[rules.rule."js/no-await-in-loop"]
enabled = true

# CHANGELOG.md references types that have since been renamed or deleted.
# These are historical records, not live code references.
# CLAUDE.md / CONTEXT.md / POLISH.md contain notes referring to stdlib types
# (OnceLock, FromStr, Display) and planning struct names — not live code.
[rules.rule."broken-ref"]
allow = ["CHANGELOG.md", "CLAUDE.md", "CONTEXT.md", "POLISH.md"]

[rules.rule."long-file"]
enabled = true
severity = "error"
threshold = 6400
allow = [
    # Generated by tree-sitter
    "grammars/**",
    # Vendored from ripgrep — flag definitions are intentionally one large file
    "crates/normalize/src/rg/**",
]

[rules.rule."high-complexity"]
enabled = true
severity = "error"
threshold = 91
allow = [
    # Vendored from ripgrep
    "crates/normalize/src/rg/**",
    # Grammar loader has large match blocks — one arm per language
    "crates/normalize-languages/src/grammar_loader.rs",
]

# The native long-function rule supersedes the fact-engine long-function rule
# (same check, but configurable threshold). Disable the fact variant.
[rules.rule."long-function"]
enabled = true
severity = "error"
threshold = 430
allow = [
    # Vendored from ripgrep
    "crates/normalize/src/rg/**",
    # Vendored from ast-grep
    "crates/normalize/src/ast_grep/**",
    # Grammar loader / registry — one arm per ~98 languages
    "crates/normalize-languages/src/grammar_loader.rs",
    "crates/normalize-languages/src/registry.rs",
    # Language files have large unused_node_kinds_audit test functions
    "crates/normalize-languages/src/*.rs",
    # Rules service run() method: large due to orchestrating multiple engines
    "crates/normalize-rules/src/service.rs",
]

[rules.rule."go/context-todo"]
enabled = false

[rules.rule."typescript/no-non-null-assertion"]
enabled = false

[rules.rule."ruby/string-concat"]
enabled = false

[aliases]
todo = ["TODO.md"]
[embeddings]
enabled = true
